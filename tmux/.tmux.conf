# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# ESC key fix
set -sg escape-time 8

# Vi mode
set -g mode-keys vi

# Vi mode key bindings for copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi 'C-b' send -X begin-selection \; send -X rectangle-on
bind -T copy-mode-vi y if-shell "uname -s = 'Darwin'" \
    "send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "send-keys -X copy-pipe-and-cancel 'clip.exe'"

# override incorrect previous binding
bind p previous-window

# Paste from system clipboard
bind-key C-p if-shell "uname -s = 'Darwin'" \
    "run \"pbpaste | tmux load-buffer - ; tmux paste-buffer\"" \
    "run \"powershell.exe -command Get-Clipboard | tr -d '\r' | tmux load-buffer - ; tmux paste-buffer\""

# Vi mode pane switching with Ctrl+h/j/k/l (vim-tmux-navigator)
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Window navigation with Alt
bind -n M-n next-window
bind -n M-p previous-window

# alias for syncing panes
bind-key V setw synchronize-panes\; display "Synchronization: #{?pane_synchronized,on,off}"

# alias for tree view of windows and panes
bind-key S choose-tree -Z

# Update environment variables
set-option -g update-environment "\
  SSH_AUTH_SOCK \
  SSH_CONNECTION \
  DISPLAY"

# Start panes/windows in zsh so shell functions from .zshrc are available.
set-option -g default-shell /usr/bin/zsh
set-option -g default-command "/usr/bin/zsh -l"

# Colors
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features ",xterm-kitty:RGB"

##### COLORSCHEME: gruvbox dark (medium)
set-option -g status "on"

# default statusbar color
set-option -g status-style bg=#282828,fg=#ebdbb2

# default window title colors
set-window-option -g window-status-style bg=#3c3836,fg=#ebdbb2

# default window with an activity alert
set-window-option -g window-status-activity-style bg=#282828,fg=#a89984

# active window title colors
set-window-option -g window-status-current-style bg=#d65d0e,fg=#282828

# pane border
set-option -g pane-active-border-style fg=#a89984
set-option -g pane-border-style fg=#3c3836

# message infos
set-option -g message-style bg=#3c3836,fg=#ebdbb2

# writing commands inactive
set-option -g message-command-style bg=#3c3836,fg=#ebdbb2

# pane number display
set-option -g display-panes-active-colour "#a89984"
set-option -g display-panes-colour "#3c3836"

# clock
set-window-option -g clock-mode-colour "#83a598"

# bell
set-window-option -g window-status-bell-style bg=#cc241d,fg=#282828

## Theme settings mixed with colors (unfortunately, but there is no cleaner way)
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[bg=#504945,fg=#ebdbb2] #S #[bg=#282828,fg=#504945,nobold,noitalics,nounderscore]"
set-option -g status-right "#[bg=#282828,fg=#3c3836,nobold,nounderscore,noitalics]#[bg=#3c3836,fg=#d5c4a1] %Y-%m-%d  %H:%M #[bg=#3c3836,fg=#a89984,nobold,noitalics,nounderscore]#[bg=#a89984,fg=#282828] #h "

set-window-option -g window-status-current-format "#[bg=#d79921,fg=#282828,nobold,noitalics,nounderscore]#[bg=#d79921,fg=#3c3836] #I #[bg=#d79921,fg=#282828,bold] #W#{?window_zoomed_flag,*Z,} #[bg=#282828,fg=#d79921,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[bg=#3c3836,fg=#282828,noitalics]#[bg=#3c3836,fg=#ebdbb2] #I #[bg=#3c3836,fg=#ebdbb2] #W #[bg=#282828,fg=#3c3836,noitalics]"

# vim: set ft=tmux tw=0 nowrap:tmux
